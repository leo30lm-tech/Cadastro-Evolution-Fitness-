<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  'SEU_SUPABASE_URL',
  'SUA_ANON_KEY'
);

// =========================
// FUNÇÃO PRINCIPAL
// =========================
async function enviarCadastro() {

  const nome      = document.getElementById('nome').value.trim();
  const cpf       = document.getElementById('cpf').value.trim();
  const nasc      = document.getElementById('nascimento').value;
  const wpp       = document.getElementById('whatsapp').value.trim();
  const email     = document.getElementById('email').value.trim();
  const instagram = document.getElementById('instagram').value.trim();
  const rua       = document.getElementById('rua').value.trim();
  const bairro    = document.getElementById('bairro').value.trim();
  const cidade    = document.getElementById('cidade').value.trim();
  const estado    = document.getElementById('estado').value;
  const cep       = document.getElementById('cep').value.trim();

  const interesses = Array.from(document.querySelectorAll('.checkboxes input:checked'))
    .map(cb => cb.value).join(', ') || 'Nao informado';

  // =========================
  // FORMATAR DATA
  // =========================
  const [y, m, d] = nasc.split('-');
  const nascFmt = `${d}/${m}/${y}`;

  // =========================
  // SALVAR NO BANCO
  // =========================
  const { data, error } = await supabase
    .from('alunos')
    .insert([{
      nome,
      cpf,
      nascimento: nascFmt,
      whatsapp: wpp,
      email,
      instagram,
      rua,
      bairro,
      cidade,
      estado,
      cep,
      plano: interesses
    }]);

  console.log('SALVO:', data);
  console.log('ERRO:', error);

  // =========================
  // MENSAGEM WHATSAPP
  // =========================
  const msg =
`EVOLUTION FITNESS — FICHA DE MATRICULA

——————————————————————
DADOS PESSOAIS
——————————————————————
Nome: ${nome}
CPF: ${cpf}
Data de Nascimento: ${nascFmt}
WhatsApp: ${wpp}
E-mail: ${email || 'Nao informado'}
Instagram: ${instagram || 'Nao informado'}

——————————————————————
ENDERECO
——————————————————————
Rua: ${rua}
Bairro: ${bairro}
Cidade: ${cidade} / ${estado}
CEP: ${cep}

——————————————————————
PLANO ESCOLHIDO
——————————————————————
${interesses}
——————————————————————
Cadastro realizado pelo formulario digital.`;

  const url = `https://wa.me/5524981433386?text=${encodeURIComponent(msg)}`;

  // =========================
  // UI + REDIRECIONAMENTO
  // =========================
  document.getElementById('formMain').style.display = 'none';
  document.getElementById('successWrap').classList.add('show');

  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>

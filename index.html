<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
console.log('SCRIPT INICIADO');

// ✅ proteção contra erro de carregamento
if (!window.supabase) {
  console.error('Supabase NÃO carregou!');
}

const supabaseClient = window.supabase.createClient(
  'https://wxhopowiowujebscvrkw.supabase.co',
  'SUA_KEY_AQUI'
);

async function enviarCadastro() {

  try {

    const nome      = document.getElementById('nome').value.trim();
    const cpf       = document.getElementById('cpf').value.trim();
    const nasc      = document.getElementById('nascimento').value;
    const wpp       = document.getElementById('whatsapp').value.trim();
    const email     = document.getElementById('email').value.trim();
    const instagram = document.getElementById('instagram').value.trim();
    const rua       = document.getElementById('rua').value.trim();
    const bairro    = document.getElementById('bairro').value.trim();
    const cidade    = document.getElementById('cidade').value.trim();
    const estado    = document.getElementById('estado').value;
    const cep       = document.getElementById('cep').value.trim();

    const interesses = Array.from(document.querySelectorAll('.checkboxes input:checked'))
      .map(cb => cb.value).join(', ') || 'Nao informado';

    if (!nome || !cpf || !nasc || !wpp) {
      alert('Preencha todos os campos obrigatórios!');
      return;
    }

    const [y, m, d] = nasc.split('-');
    const nascFmt = `${d}/${m}/${y}`;

    // 🔥 SALVAR NO BANCO
    const { data, error } = await supabaseClient
      .from('alunos')
      .insert([{
        nome,
        cpf,
        nascimento: nascFmt,
        whatsapp: wpp,
        email,
        instagram,
        rua,
        bairro,
        cidade,
        estado,
        cep,
        plano: interesses
      }]);

    console.log('SALVO:', data);
    console.log('ERRO:', error);

    if (error) {
      alert('Erro ao salvar no banco.');
      return;
    }

    // 🔥 WHATSAPP
    const msg =
`EVOLUTION FITNESS — FICHA DE MATRICULA

Nome: ${nome}
CPF: ${cpf}
Nascimento: ${nascFmt}
WhatsApp: ${wpp}
Plano: ${interesses}`;

    const url = `https://wa.me/5524981433386?text=${encodeURIComponent(msg)}`;

    document.getElementById('formMain').style.display = 'none';
    document.getElementById('successWrap').classList.add('show');

    window.open(url, '_blank');

  } catch (err) {
    console.error('ERRO GERAL:', err);
    alert('Erro inesperado. Veja o console.');
  }
}
</script>
